<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cockpit du Cerveau partage</title>
<style>
  :root{
    --bg:#f4f5fb; --surface:#ffffff; --surface-2:#fafbff; --ink:#181a2a;
    --muted:#646b8a; --line:#e7e9f4; --accent:#5b4ddb; --accent-soft:#ece9ff;
    --shadow:0 1px 2px rgba(24,26,42,.05),0 8px 24px -12px rgba(24,26,42,.18);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(1200px 600px at 100% -10%, #efeaff 0%, transparent 55%),
      radial-gradient(1000px 500px at -10% 0%, #e6f0ff 0%, transparent 50%),
      var(--bg);
    color:var(--ink); -webkit-font-smoothing:antialiased; line-height:1.55;
    min-height:100vh;
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}

  /* ---- Top bar ---- */
  header.top{position:sticky;top:0;z-index:30;backdrop-filter:saturate(1.4) blur(10px);
    background:rgba(244,245,251,.82);border-bottom:1px solid var(--line)}
  .top-inner{display:flex;align-items:center;gap:18px;padding:14px 22px;max-width:1180px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
  .brand .logo{width:40px;height:40px;border-radius:12px;flex:none;
    background:linear-gradient(135deg,#6c5ce7,#8e7bff);display:grid;place-items:center;
    color:#fff;font-size:20px;box-shadow:0 6px 18px -6px rgba(108,92,231,.7)}
  .brand h1{font-size:16px;margin:0;letter-spacing:-.01em}
  .brand p{margin:0;font-size:12px;color:var(--muted)}
  .search{margin-left:auto;position:relative;flex:1;max-width:420px}
  .search input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--line);
    border-radius:12px;background:var(--surface);font-size:14px;color:var(--ink);
    outline:none;transition:border-color .15s,box-shadow .15s}
  .search input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
  .search .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;font-size:15px}
  .search kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;
    color:var(--muted);background:var(--surface-2);border:1px solid var(--line);
    border-radius:6px;padding:2px 6px}

  /* ---- Layout ---- */
  .layout{display:grid;grid-template-columns:236px 1fr;gap:28px;padding:28px 0 80px}
  nav.side{position:sticky;top:84px;align-self:start;display:flex;flex-direction:column;gap:4px}
  nav.side .navlabel{font-size:11px;text-transform:uppercase;letter-spacing:.08em;
    color:var(--muted);margin:6px 10px 4px;font-weight:600}
  .navitem{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;
    cursor:pointer;font-size:14px;color:var(--ink);transition:background .12s;border:1px solid transparent}
  .navitem:hover{background:var(--surface)}
  .navitem.active{background:var(--surface);border-color:var(--line);box-shadow:var(--shadow);font-weight:600}
  .navitem .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;
    font-size:14px;background:var(--accent-soft);flex:none}
  .navitem .badge{margin-left:auto;font-size:11px;color:var(--muted);background:var(--surface-2);
    border:1px solid var(--line);border-radius:20px;padding:1px 8px;min-width:22px;text-align:center}
  main{min-width:0}

  /* ---- Hero ---- */
  .hero{background:linear-gradient(135deg,#fff, #fbfaff);border:1px solid var(--line);
    border-radius:var(--radius);padding:26px 28px;box-shadow:var(--shadow);margin-bottom:24px;
    position:relative;overflow:hidden}
  .hero:after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;
    background:radial-gradient(circle,#efeaff,transparent 70%);pointer-events:none}
  .hero h2{margin:0 0 6px;font-size:24px;letter-spacing:-.02em}
  .hero p{margin:0;color:var(--muted);font-size:14px;max-width:640px}
  .stats{display:flex;gap:26px;margin-top:20px;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column}
  .stat b{font-size:24px;letter-spacing:-.02em}
  .stat span{font-size:12px;color:var(--muted)}

  .sectiontitle{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);
    font-weight:700;margin:30px 2px 14px}

  /* ---- Folder cards ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .14s,box-shadow .14s;
    position:relative;overflow:hidden}
  .card:hover{transform:translateY(-3px);box-shadow:0 14px 32px -16px rgba(24,26,42,.35)}
  .card .topbar{height:4px;border-radius:4px;width:42px;margin-bottom:14px}
  .card .ic{font-size:24px;margin-bottom:8px}
  .card h3{margin:0 0 4px;font-size:16px;letter-spacing:-.01em}
  .card .sub{font-size:13px;color:var(--muted);margin:0 0 10px}
  .card .ex{font-size:12px;color:var(--muted);opacity:.85;margin:0}
  .card .count{position:absolute;top:16px;right:16px;font-size:12px;font-weight:600;
    background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:3px 10px}

  /* ---- Note cards ---- */
  .notecard{background:var(--surface);border:1px solid var(--line);border-radius:14px;
    padding:16px 18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s;margin-bottom:12px}
  .notecard:hover{transform:translateY(-2px);box-shadow:0 12px 28px -16px rgba(24,26,42,.32)}
  .notecard h3{margin:0 0 6px;font-size:16px;letter-spacing:-.01em}
  .notemeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .chip{font-size:11px;border-radius:20px;padding:2px 9px;border:1px solid var(--line);background:var(--surface-2)}
  .chip.kw{background:var(--accent-soft);border-color:transparent;color:#4a3fc0}
  .badge-status{font-size:11px;font-weight:600;border-radius:20px;padding:2px 10px}
  .st-stable{background:#e6f7ed;color:#0a7d3c}
  .st-encours{background:#fff1e6;color:#c2620a}
  .st-example{background:#eef0f6;color:#727a96}
  .excerpt{color:var(--muted);font-size:13px;margin:8px 0 0;display:-webkit-box;
    -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  /* ---- Note reader ---- */
  .reader{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:30px 34px;box-shadow:var(--shadow)}
  .backlink{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);
    cursor:pointer;margin-bottom:16px}
  .backlink:hover{color:var(--accent)}
  .reader-head{border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:20px}
  .reader-head h2{margin:0 0 10px;font-size:26px;letter-spacing:-.02em}
  .md{font-size:15px}
  .md h1{font-size:22px;margin:24px 0 12px;letter-spacing:-.01em}
  .md h2{font-size:19px;margin:22px 0 10px;letter-spacing:-.01em}
  .md h3{font-size:16px;margin:18px 0 8px}
  .md p{margin:10px 0}
  .md ul,.md ol{margin:10px 0;padding-left:22px}
  .md li{margin:4px 0}
  .md code{background:var(--surface-2);border:1px solid var(--line);border-radius:6px;
    padding:1px 6px;font-size:13px;font-family:"SF Mono",Menlo,Consolas,monospace}
  .md pre{background:#15172a;color:#e7e9f4;border-radius:12px;padding:16px 18px;overflow:auto;font-size:13px}
  .md pre code{background:none;border:none;color:inherit;padding:0}
  .md blockquote{border-left:3px solid var(--accent);margin:14px 0;padding:4px 16px;
    color:var(--muted);background:var(--surface-2);border-radius:0 10px 10px 0}
  .md hr{border:none;border-top:1px solid var(--line);margin:22px 0}
  .md table{border-collapse:collapse;width:100%;margin:14px 0;font-size:14px}
  .md th,.md td{border:1px solid var(--line);padding:8px 12px;text-align:left;vertical-align:top}
  .md th{background:var(--surface-2);font-weight:600}
  .md tr:nth-child(even) td{background:var(--surface-2)}

  /* ---- Journal timeline ---- */
  .timeline{position:relative;margin-left:8px;padding-left:26px}
  .timeline:before{content:"";position:absolute;left:5px;top:6px;bottom:6px;width:2px;background:var(--line)}
  .tl-item{position:relative;margin-bottom:18px}
  .tl-item:before{content:"";position:absolute;left:-25px;top:5px;width:12px;height:12px;border-radius:50%;
    background:var(--accent);border:3px solid var(--surface);box-shadow:0 0 0 1px var(--line)}
  .tl-item .tl-date{font-size:12px;color:var(--muted);font-weight:600}
  .tl-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:12px 16px;box-shadow:var(--shadow);margin-top:6px}
  .tl-card .tl-file{font-size:12px;font-family:"SF Mono",Menlo,Consolas,monospace;color:var(--accent)}
  .tl-card .tl-sum{margin:4px 0 0;font-size:14px}
  .tl-card .tl-auth{font-size:12px;color:var(--muted)}

  /* ---- Search results ---- */
  .hit-snippet{font-size:13px;color:var(--muted);margin-top:6px}
  mark{background:#fff1a8;color:inherit;border-radius:3px;padding:0 2px}
  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  .empty .big{font-size:40px;margin-bottom:10px}

  footer{color:var(--muted);font-size:12px;text-align:center;padding:30px 0 10px}
  .pill{display:inline-block;font-size:11px;background:var(--accent-soft);color:#4a3fc0;
    border-radius:20px;padding:2px 10px;margin-left:8px;font-weight:600}
  .hidden{display:none!important}
  @media (max-width:820px){
    .layout{grid-template-columns:1fr}
    nav.side{position:static;flex-direction:row;flex-wrap:wrap;margin-bottom:8px}
    .navitem .badge{margin-left:6px}
    .search{max-width:none}
  }
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand" onclick="go('home')">
      <div class="logo">&#129504;</div>
      <div><h1>Cerveau partage</h1><p>Cockpit &middot; lecture seule</p></div>
    </div>
    <div class="search">
      <span class="si">&#128269;</span>
      <input id="q" type="search" placeholder="Rechercher dans les fiches, mots-cles, journal..." autocomplete="off">
      <kbd>/</kbd>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="layout">
    <nav class="side" id="nav"></nav>
    <main id="main"></main>
  </div>
</div>

<footer>
  Snapshot genere le <span id="genstamp"></span> &middot; page autonome en lecture seule, regeneree avec <code>_cockpit/generate.py</code>.

</footer>

<script>
const DATA = {"folders": [{"id": "01_reglementaire", "label": "Reglementaire", "icon": "&#9878;", "subject": "Conformite, obligations legales", "examples": "RGPD, normes, mentions obligatoires, facturation electronique", "accent": "#d97706", "notes": [{"title": "Exemple : conservation des donnees personnelles", "file": "_exemple.md", "statut": "stable", "maj": "2026-06-24", "auteur": "Cerveau Partage", "motscles": ["rgpd", "donnees personnelles", "conservation", "exemple"], "body": "Fiche d'exemple. Elle montre le format attendu dans `01_reglementaire/`. Remplacez son contenu ou supprimez-la.\n\n## Regle\nLes donnees personnelles d'un compte inactif sont conservees au maximum 36 mois apres le dernier acces, puis anonymisees.\n\n## Source\nReference interne ou texte de loi applicable (a citer ici).\n\n## Impact produit\nPrevoir un traitement automatique d'anonymisation et un message d'information au moment de la cloture de compte.\n\n---\n\n*Example note (EN): shows the expected format for the `01_reglementaire/` folder (compliance and legal obligations). Replace or delete it.*", "is_example": true, "wordcount": 86}], "count_real": 0, "count_example": 1}, {"id": "02_specs_fonctionnelles", "label": "Specs fonctionnelles", "icon": "&#129513;", "subject": "Comportement du produit", "examples": "parcours utilisateur, regles metier, fonctionnalites, cas limites", "accent": "#2563eb", "notes": [{"title": "Exemple : reinitialisation de mot de passe", "file": "_exemple.md", "statut": "stable", "maj": "2026-06-24", "auteur": "Cerveau Partage", "motscles": ["authentification", "mot de passe", "parcours", "exemple"], "body": "Fiche d'exemple. Elle montre le format attendu dans `02_specs_fonctionnelles/`. Remplacez son contenu ou supprimez-la.\n\n## Besoin\nUn utilisateur qui a oublie son mot de passe doit pouvoir le reinitialiser sans contacter le support.\n\n## Parcours\n1. L'utilisateur saisit son email.\n2. Un lien valable 30 minutes est envoye.\n3. Apres definition d'un nouveau mot de passe, toutes les sessions actives sont fermees.\n\n## Regles metier\nLe lien est a usage unique. Au dela de 5 demandes par heure, on temporise.\n\n---\n\n*Example note (EN): shows the expected format for the `02_specs_fonctionnelles/` folder (product behavior, user journeys, business rules). Replace or delete it.*", "is_example": true, "wordcount": 102}], "count_real": 0, "count_example": 1}, {"id": "03_specs_techniques", "label": "Specs techniques", "icon": "&#128295;", "subject": "Realisation technique", "examples": "architecture, API, schema de donnees, stack, implementation", "accent": "#0d9488", "notes": [{"title": "Exemple : convention de nommage des API", "file": "_exemple.md", "statut": "stable", "maj": "2026-06-24", "auteur": "Cerveau Partage", "motscles": ["api", "rest", "convention", "exemple"], "body": "Fiche d'exemple. Elle montre le format attendu dans `03_specs_techniques/`. Remplacez son contenu ou supprimez-la.\n\n## Decision\nLes routes REST sont au pluriel et en minuscules (`/invoices`, `/contacts`). Les identifiants sont des UUID v4.\n\n## Raison\nCoherence avec l'existant et lisibilite des logs.\n\n## Consequences\nToute nouvelle ressource suit cette convention. Les anciennes routes au singulier sont maintenues en redirection jusqu'a la prochaine version majeure.\n\n---\n\n*Example note (EN): shows the expected format for the `03_specs_techniques/` folder (architecture, API, data model, technical choices). Replace or delete it.*", "is_example": true, "wordcount": 86}], "count_real": 0, "count_example": 1}, {"id": "04_skills", "label": "Skills", "icon": "&#129302;", "subject": "Travail avec l'IA", "examples": "prompts, skills, procedures reutilisables, methodes de travail", "accent": "#7c3aed", "notes": [{"title": "Exemple : redaction d'une note de version", "file": "_exemple.md", "statut": "stable", "maj": "2026-06-24", "auteur": "Cerveau Partage", "motscles": ["prompt", "note de version", "procedure", "exemple"], "body": "Fiche d'exemple. Elle montre le format attendu dans `04_skills/`. Remplacez son contenu ou supprimez-la.\n\n## Quand l'utiliser\nPour transformer une liste de tickets resolus en note de version lisible par les clients.\n\n## Procedure\n1. Regrouper les changements en trois categories : nouveautes, ameliorations, corrections.\n2. Une phrase par element, orientee benefice utilisateur, sans jargon technique.\n3. Mettre en avant le changement le plus visible en premier.\n\n## Exemple de formulation\nPlutot que \"fix bug cache\", ecrire \"Les modifications recentes apparaissent maintenant immediatement\".\n\n---\n\n*Example note (EN): shows the expected format for the `04_skills/` folder (prompts, reusable AI procedures, working methods). Replace or delete it.*", "is_example": true, "wordcount": 103}], "count_real": 0, "count_example": 1}, {"id": "05_roadmap", "label": "Roadmap", "icon": "&#129517;", "subject": "Direction produit", "examples": "vision, priorites, jalons, ce qui est prevu plus tard", "accent": "#db2777", "notes": [{"title": "Exemple : priorites du trimestre", "file": "_exemple.md", "statut": "stable", "maj": "2026-06-24", "auteur": "Cerveau Partage", "motscles": ["roadmap", "priorites", "jalons", "exemple"], "body": "Fiche d'exemple. Elle montre le format attendu dans `05_roadmap/`. Remplacez son contenu ou supprimez-la.\n\n## Cap\nReduire le temps d'onboarding d'un nouvel utilisateur.\n\n## Maintenant\nRefonte de l'ecran d'accueil et premier parcours guide.\n\n## Ensuite\nModeles preremplis par secteur d'activite.\n\n## Plus tard\nImport automatique depuis des outils tiers.\n\n---\n\n*Example note (EN): shows the expected format for the `05_roadmap/` folder (vision, priorities, milestones). Replace or delete it.*", "is_example": true, "wordcount": 70}], "count_real": 0, "count_example": 1}, {"id": "06_en_cours", "label": "En cours", "icon": "&#128293;", "subject": "Sujets non stabilises", "examples": "decisions en cours, questions ouvertes, travaux a trancher", "accent": "#dc2626", "notes": [{"title": "Exemple : choix du fournisseur d'envoi d'emails", "file": "_exemple.md", "statut": "en cours", "maj": "2026-06-24", "auteur": "Cerveau Partage", "motscles": ["decision", "email", "fournisseur", "exemple"], "body": "Fiche d'exemple. Elle montre le format attendu dans `06_en_cours/`. Remplacez son contenu ou supprimez-la.\n\n## Question ouverte\nQuel fournisseur d'envoi d'emails transactionnels retenir ?\n\n## Options envisagees\n- Option A : moins chere, mais delivrabilite a verifier.\n- Option B : plus chere, reputation etablie.\n\n## A trancher\nDecision attendue apres un test de delivrabilite sur deux semaines. Une fois tranchee, deplacer cette fiche vers `03_specs_techniques/`.\n\n---\n\n*Example note (EN): shows the expected format for the `06_en_cours/` folder (ongoing decisions, open questions). Once settled, the note is moved to its final folder. Replace or delete it.*", "is_example": true, "wordcount": 91}], "count_real": 0, "count_example": 1}], "contexte": "# 00 - CONTEXTE : mode d'emploi du cerveau partage\n\n> Ce fichier est la source unique de verite du cerveau. Il est lu en premier au demarrage de chaque session IA. Il reste comprehensible meme sans l'outil \"Cerveau Partage\" : ce ne sont que des fichiers Markdown.\n\n*(English version below / Version anglaise plus bas)*\n\n---\n\n## A quoi sert ce dossier\n\nCe dossier est la memoire commune d'une equipe produit. Chacun y verse le savoir stabilise (reglementaire, specs, decisions, roadmap, skills), et tout le monde le relit au demarrage de ses sessions IA. Objectif : ne plus reexpliquer ce qui est deja su, et garder une trace auditable des decisions.\n\n## Les deux regles fondamentales\n\n1. **Lecture ciblee au demarrage.** L'IA lit ce fichier, puis charge uniquement le ou les sous-dossiers utiles au sujet en cours (voir la table d'aiguillage). Elle ne charge pas tout le cerveau.\n2. **Ecriture sur declenchement humain uniquement.** Rien n'est ecrit dans le cerveau sans le mot-cle explicite **\"MAJ cerveau\"**. Aucune ecriture spontanee.\n\n## Table d'aiguillage\n\nPour trouver ou lire et ou ecrire, on associe un sujet a un dossier.\n\n| Sujet | Dossier | Exemples de contenu |\n|-------|---------|---------------------|\n| Conformite, obligations legales | `01_reglementaire/` | RGPD, normes, mentions obligatoires, facturation electronique, contraintes legales |\n| Comportement du produit | `02_specs_fonctionnelles/` | parcours utilisateur, regles metier, fonctionnalites, cas limites |\n| Realisation technique | `03_specs_techniques/` | architecture, API, schema de donnees, stack, choix d'implementation |\n| Travail avec l'IA | `04_skills/` | prompts, skills, procedures reutilisables, methodes de travail |\n| Direction produit | `05_roadmap/` | vision, priorites, jalons, ce qui est prevu plus tard |\n| Sujets non stabilises | `06_en_cours/` | decisions en cours, questions ouvertes, travaux a trancher |\n\nRegle de tri en cas de doute : on choisit le dossier qui correspond a la **nature** de l'information, pas au projet qui l'a produite. Si une info est encore mouvante, elle va dans `06_en_cours/` ; une fois stabilisee, elle est deplacee vers son dossier definitif.\n\n## Convention des fiches\n\nChaque fiche est un fichier `.md`. Nom en minuscules, mots separes par des tirets bas, sans accents (exemple : `mentions-obligatoires-facture.md`). En-tete standard :\n\n```\n# Titre clair de la fiche\n\n> Statut : stable | Derniere maj : AAAA-MM-JJ | Auteur : Prenom | Mots-cles : mot1, mot2, mot3\n\nContenu de la fiche.\n```\n\nLes mots-cles servent au reperage et a l'anti-doublon. Le statut vaut `stable` dans les dossiers definitifs et `en cours` dans `06_en_cours/`.\n\n## Convention du journal\n\nLe fichier `00_JOURNAL.md` enregistre chaque ecriture, ligne la plus recente en haut, au format tableau : date, auteur, fichier, resume en une phrase.\n\n## Hors perimetre\n\nPas de serveur, pas de base de donnees, pas de recherche seman /* ---------- mini Markdown -> HTML (autonome) ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inlineMd(s){
  s = esc(s);
  s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/(^|[^\w])(https?:\/\/[^\s<]+)/g, (m,p,u)=> p+'<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\s][^*]*)\*/g,'$1<em>$2</em>');
  return s;
}
function renderMd(src){
  if(!src) return '';
  const lines = src.replace(/\r/g,'').split('\n');
  let html='', i=0;
  function flushTableMaybe(){}
  while(i<lines.length){
    let line = lines[i];
    // table
    if(/^\s*\|.*\|\s*$/.test(line) && i+1<lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i+1]) && lines[i+1].includes('-')){
      const header = line.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      i+=2;
      let rows=[];
      while(i<lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){
        rows.push(lines[i].trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim()));
        i++;
      }
      html+='<table><thead><tr>'+header.map(h=>'<th>'+inlineMd(h)+'</th>').join('')+'</tr></thead><tbody>';
      rows.forEach(r=>{html+='<tr>'+r.map(c=>'<td>'+inlineMd(c)+'</td>').join('')+'</tr>';});
      html+='</tbody></table>';
      continue;
    }
    // code fence
    if(/^```/.test(line)){
      i++; let buf=[];
      while(i<lines.length && !/^```/.test(lines[i])){buf.push(lines[i]);i++;}
      i++;
      html+='<pre><code>'+esc(buf.join('\n'))+'</code></pre>';
      continue;
    }
    // heading
    let h = line.match(/^(#{1,6})\s+(.*)$/);
    if(h){ const lvl=h[1].length; html+='<h'+lvl+'>'+inlineMd(h[2])+'</h'+lvl+'>'; i++; continue; }
    // hr
    if(/^\s*([-*_])\1{2,}\s*$/.test(line)){ html+='<hr>'; i++; continue; }
    // blockquote
    if(/^\s*>\s?/.test(line)){
      let buf=[];
      while(i<lines.length && /^\s*>\s?/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,''));i++;}
      html+='<blockquote>'+renderMd(buf.join('\n'))+'</blockquote>';
      continue;
    }
    // unordered list
    if(/^\s*[-*]\s+/.test(line)){
      let buf=[];
      while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*[-*]\s+/,''));i++;}
      html+='<ul>'+buf.map(b=>'<li>'+inlineMd(b)+'</li>').join('')+'</ul>';
      continue;
    }
    // ordered list
    if(/^\s*\d+\.\s+/.test(line)){
      let buf=[];
      while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){buf.push(lines[i].replace(/^\s*\d+\.\s+/,''));i++;}
      html+='<ol>'+buf.map(b=>'<li>'+inlineMd(b)+'</li>').join('')+'</ol>';
      continue;
    }
    // blank
    if(/^\s*$/.test(line)){ i++; continue; }
    // paragraph
    let buf=[line]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6})\s/.test(lines[i])
          && !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i])
          && !/^\s*>\s?/.test(lines[i]) && !/^```/.test(lines[i])
          && !/^\s*([-*_])\1{2,}\s*$/.test(lines[i])){buf.push(lines[i]);i++;}
    html+='<p>'+inlineMd(buf.join(' '))+'</p>';
  }
  return html;
}

function plainExcerpt(src,n){
  let t = src.replace(/[#>*`\-]/g,' ').replace(/\[([^\]]+)\]\([^)]+\)/g,'$1').replace(/\s+/g,' ').trim();
  return t.length>n ? t.slice(0,n)+'…' : t;
}
function statusClass(s){
  const l=(s||'').toLowerCase();
  if(l.includes('stable')) return 'st-stable';
  if(l.includes('cours')) return 'st-encours';
  return 'st-example';
}

/* ---------- search ---------- */
function hilite(text,q){
  const lc=text.toLowerCase(), idx=lc.indexOf(q.toLowerCase());
  if(idx<0) return esc(text.slice(0,160));
  const start=Math.max(0,idx-50);
  const pre=(start>0?String.fromCharCode(8230):"")+text.slice(start,idx);
  const mid=text.slice(idx,idx+q.length);
  const post=text.slice(idx+q.length, idx+q.length+90)+String.fromCharCode(8230);
  return esc(pre)+"<mark>"+esc(mid)+"</mark>"+esc(post);
}
function doSearch(q){
  q=q.trim();
  const main=document.getElementById('main');
  if(q.length<2){ render(); return; }
  buildNav();
  const ql=q.toLowerCase();
  let hits=[];
  DATA.folders.forEach(f=>{
    f.notes.forEach(n=>{
      const hay=(n.title+' '+(n.motscles||[]).join(' ')+' '+n.body).toLowerCase();
      if(hay.includes(ql)){
        let where = n.title.toLowerCase().includes(ql)?'titre':
          ((n.motscles||[]).join(' ').toLowerCase().includes(ql)?'mot-cle':'contenu');
        hits.push({f:f,n:n,where:where});
      }
    });
  });
  let jh=[];
  DATA.journal.forEach(r=>{
    if((r.resume+' '+r.fichier+' '+r.auteur).toLowerCase().includes(ql)) jh.push(r);
  });
  let h='<section class="hero" style="padding:20px 24px"><h2>Recherche : &laquo; '+esc(q)+' &raquo;</h2>'+
    '<p>'+hits.length+' fiche(s) et '+jh.length+' entree(s) de journal correspondent.</p></section>';
  if(!hits.length && !jh.length){
    main.innerHTML = h + emptyState('&#128269;','Rien trouve.','Essaie un autre terme ou parcours les dossiers.');
    return;
  }
  if(hits.length){
    h+='<div class="sectiontitle">Fiches</div>';
    hits.forEach(hit=>{
      const n=hit.n,f=hit.f;
      h+='<div class="notecard" onclick="openNote(\''+f.id+'\',\''+n.file.replace(/'/g,"\\'")+'\')">'+
        '<h3>'+n.title+'</h3>'+
        '<div class="notemeta"><span class="chip">'+f.icon+' '+f.label+'</span>'+
        '<span class="chip kw">trouve dans : '+hit.where+'</span></div>'+
        '<p class="hit-snippet">'+hilite(n.body||n.title, q)+'</p></div>';
    });
  }
  if(jh.length){
    h+='<div class="sectiontitle">Journal</div>'+timelineHtml(jh);
  }
  main.innerHTML=h;
}

document.addEventListener('keydown',e=>{
  if(e.key==='/' && document.activeElement!==qinput){e.preventDefault();qinput.focus();}
  if(e.key==='Escape'){qinput.value='';render();qinput.blur();}
});

render();
</script>
</body>
</html>
